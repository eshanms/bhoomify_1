<script>
  if (localStorage.getItem("role") !== "faculty") {
    window.location.href = "login.html";
  }
</script>
<body>
<div class="container">
  <h2>👨‍🏫 Faculty Dashboard</h2>

  <div class="card">
    <h3>Assign Points</h3>

    <form onsubmit="assignPoints(event)">
      <input type="text" id="studentName" placeholder="Student Name"><br><br>
      <input type="number" id="points" placeholder="Points"><br><br>
      <button type="submit">Assign</button>
    </form>
  </div>
</div>
<button onclick="logout()">Logout</button>
<script src="app.js"></script>
</body>
<style>
body {
  animation: fadePage 0.4s ease;
}

@keyframes fadePage {
  from { opacity: 0; }
  to { opacity: 1; }
}
</style>
