<body>
<div class="container">
  <h2>👨‍🏫 Faculty Dashboard</h2>

  <div class="card">
    <h3>Assign Points</h3>

    <form onsubmit="assignPoints(event)">
      <input type="text" id="studentName" placeholder="Student Name"><br><br>
      <input type="number" id="points" placeholder="Points"><br><br>
      <button type="submit">Assign</button>
    </form>
  </div>
</div>

<script src="app.js"></script>
</body>
