<!DOCTYPE html>
<html>
<head>
  <title>Login - BHOOMIFY</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>🌱 BHOOMIFY Login</h2>

  <div class="card">
    <form onsubmit="login(event); return false;">
      <input type="text" id="username" placeholder="Enter your name" ><br><br>
      <input type="password" id="password" placeholder="Enter password" ><br><br>

      <button onclick="login()">Login</button>
    </form>
  </div>
</div>
<style>
body {
  animation: fadePage 0.4s ease;
}

@keyframes fadePage {
  from { opacity: 0; }
  to { opacity: 1; }
}
</style>
<script src="app.js"></script>
</body>
</html>
